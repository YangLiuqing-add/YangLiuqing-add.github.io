short_bio: >-
  <p>
    I am an interdisciplinary researcher specializing in AI for geophysical sciences, with interests in seismic data processing and imaging, seismic inversion, 
    reservoir characterization, DAS, and interpretable machine learning.
    <img src="assets/images/photos/Inter.png" alt="Research Interests" 
         style="float: left; width: 500px; margin-right: 10px; border-radius: 8px;">
  </p>

  <p>
    I am currently a <strong>Postdoc Researcher</strong> in the Department of Earth Sciences at 
    <a href="https://www.uu.se/en" target="_blank">Uppsala University</a>, 
    advised by Prof. <a href="https://scholar.google.com/citations?user=lb1LlH4AAAAJ&hl=en" target="_blank">Alireza Malehmir</a>. 
    I received my Ph.D. in Geological Resources and Geological Engineering from 
    <a href="https://www.cup.edu.cn/" target="_blank">China University of Petroleum (Beijing)</a>.
  </p>


  <p>
    I am open to academic collaboration
    in AI for geophysical sciences, including seismic data processing and imaging, geophysical inversion, reservoir characterization, 
    DAS, and interpretable machine learning. If you are interested in collaboration, please feel free to reach out via email.
  </p>



